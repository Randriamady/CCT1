<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Caisse / CCT1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div>Gestion Caisse / CCT1</div>
  <div>
    <button id="loginBtn">Connexion</button>
    <button id="logoutBtn" style="display:none;">Déconnexion</button>
  </div>
</header>

<div id="message"></div>

<div id="app">
  <div class="sidebar">
    <button id="menuCaisse" class="active" onclick="showForm('caisse')">Caisse</button>
    <button id="menuCCT1" onclick="showForm('cct1')">CCT1</button>
  </div>
  <div class="content">
    <!-- IFRAME CACHÉE POUR ENVOI FORMULAIRE -->
    <iframe name="hidden_iframe" style="display:none;" onload="iframeLoaded()"></iframe>

    <!-- FORMULAIRE CAISSE -->
    <form id="formCaisse" method="POST" action="https://script.google.com/macros/s/AKfycbxtrmJDW5Q2zdYRxuWGSKy_OJB-AGwsHKnKEL9BvwQdupAk8arI8cSF9_FEwzM1iUHsRQ/exec" target="hidden_iframe">
      <h2>Formulaire Caisse</h2>
      <input type="hidden" name="sheet" value="caisse">
      <div class="form-row">
        <div class="form-group"><label for="date">Date</label><input type="date" name="Date" id="date" required></div>
        <div class="form-group"><label for="societe">Société</label><input type="text" name="Société" id="societe"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="libelle">Libellé</label><input type="text" name="Libellé" id="libelle"></div>
        <div class="form-group"><label for="echeance">Échéance</label><input type="date" name="Échéance" id="echeance"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="tireur">Client</label><input type="text" name="Client" id="tireur"></div>
        <div class="form-group"><label for="codeClient">Code Client</label><input type="text" name="Code Client" id="codeClient"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="produits">Produits</label><input type="text" name="Produits" id="produits"></div>
        <div class="form-group"><label for="facture">Facture</label><input type="text" name="Facture" id="facture"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="dateVersement">Date Versement</label><input type="date" name="Date Versement" id="dateVersement"></div>
        <div class="form-group"><label for="banque">Banque</label><input type="text" name="Banque" id="banque"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="typeVirement">Type Virement</label>
          <select name="Type Virement" id="typeVirement">
            <option value="">Choisir</option>
            <option value="Chèque">Chèque</option>
            <option value="Pièce">Pièce</option>
            <option value="Virement">Virement</option>
          </select>
        </div>
        <div class="form-group"><label for="montant">Montant</label><input type="number" name="Montant" id="montant"></div>
      </div>
      <div class="form-group"><label for="observation">Observation</label><textarea name="Observation" id="observation"></textarea></div>
      <button type="submit" class="submit-btn">Envoyer</button>
    </form>

    <!-- FORMULAIRE CCT1 -->
    <form id="formCCT1" method="POST" action="https://script.google.com/macros/s/AKfycbxtrmJDW5Q2zdYRxuWGSKy_OJB-AGwsHKnKEL9BvwQdupAk8arI8cSF9_FEwzM1iUHsRQ/exec" target="hidden_iframe" style="display:none;">
      <h2>Formulaire CCT1</h2>
      <input type="hidden" name="sheet" value="cct1">
      <div class="form-row">
        <div class="form-group"><label for="cct1Date">Date</label><input type="date" name="Date" id="cct1Date" required></div>
        <div class="form-group"><label for="numero">N°RV</label><input type="text" name="N°RV" id="numero"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="drda">DR-DA</label><input type="text" name="DR-DA" id="drda"></div>
        <div class="form-group"><label for="cct1Libelle">Libellé</label><input type="text" name="Libellé" id="cct1Libelle"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="recette">Recette</label><input type="number" name="Recette" id="recette"></div>
        <div class="form-group"><label for="depense">Dépense</label><input type="number" name="Dépense" id="depense"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="solde">Solde</label><input type="number" name="Solde" id="solde"></div>
        <div class="form-group"><label for="societes">Sociétés</label><input type="text" name="Sociétés" id="societes"></div>
      </div>
      <div class="form-group"><label for="commentaires">Commentaires</label><textarea name="Commentaires" id="commentaires"></textarea></div>
      <button type="submit" class="submit-btn">Envoyer</button>
    </form>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
